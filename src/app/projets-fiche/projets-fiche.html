<div class="bg-white rounded-2 p-2">
  <div class="titrePage">Fiches projet – Consultation et import</div>
  <div class="text-danger">{{errMsg}}</div>
  @if(loading){
    <p-skeleton width="100%" height="10rem" class="mb-2"></p-skeleton>
    <p-skeleton width="100%" height="10rem" class="mb-2"></p-skeleton>
    <p-skeleton width="100%" height="10rem" class="mb-2"></p-skeleton>
  }@else{
    @for (projet of listView.projets; track projet.id; let isOdd=$odd; let isEven=$even) {
      <app-projet-fiche-row
        [projet]="projet"
        [even]="isEven"
        [odd]="isOdd"
        [selected]="selectedProjet?.id===projet.id"
        (selectionChange)="onProjetSelectionne($event)"
      ></app-projet-fiche-row>
    }
  }

</div>
